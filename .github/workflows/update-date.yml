name: 🌟 Daily Weekday Synchronizer

on:
  schedule:
    - cron: '23 5 * * *'      # 每天北京时间 05:23 触发
  workflow_dispatch:           # 支持手动运行

env:
  TZ: 'Asia/Shanghai'          # 确保 git commit 时间也为北京时间

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # 允许推送

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run update script
        run: python update_weekday.py

      - name: Commit and push if changed
        run: |
          # 检查 config.json 或 update.log 是否有变更
          if git diff --quiet config.json update.log; then
            echo "ℹ️ 没有变化，无需提交。"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.json update.log
          # 从 config.json 提取新星期作为提交信息
          NEW_WEEKDAY=$(cat config.json | jq -r '.last_weekday')
          git commit -m "📅 更新星期为: $NEW_WEEKDAY"
          git push