name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5          # 已升级，消除 Node 20 警告

      - name: Setup Python
        uses: actions/setup-python@v6      # 已升级，消除 Node 20 警告
        with:
          python-version: '3.9'            

      - name: Check Python syntax
        run: python -m py_compile *.py

      - name: Install dependencies and run tests
        run: |
          pip install -r requirements.txt
          pytest
