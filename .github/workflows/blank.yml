name: Python Check (No deps)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check Python syntax
        run: |
          # 只检查实际存在的 .py 文件
          for f in *.py; do
            if [ -f "$f" ]; then
              echo "✅ 检查 $f"
              python -m py_compile "$f"
            fi
          done

      - name: Done
        run: echo "🎉 所有 Python 文件语法检查通过"
