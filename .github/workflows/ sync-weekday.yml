name: 🌟 Daily Weekday Synchronizer

on:
  schedule:
    - cron: '15 3 * * *'   # 每天 3:15 和 23:15
  workflow_dispatch:           

env:
  TZ: 'Asia/Shanghai'         

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write          

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run update script
        run: python update_weekday.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet config.json update.log; then
            echo "ℹ️ 没有变化，无需提交。"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.json update.log
          
          NEW_WEEKDAY=$(cat config.json | jq -r '.last_weekday')
          git commit -m "📅 更新星期为: $NEW_WEEKDAY"
          git push
