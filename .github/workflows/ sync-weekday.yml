name: 🌟 Daily Weekday Synchronizer

on:
  schedule:
    - cron: '0 16 * * *'          # 每天北京时间 00:00（UTC 16:00）
  workflow_dispatch:           

env:
  TZ: 'Asia/Shanghai'         

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write          

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run update script
        run: python update_weekday.py

- name: Commit and push if changed
  run: |
    # 检查是否有任何改动（config.json, update.log, README.md）
    if git diff --quiet config.json update.log README.md; then
      echo "ℹ️ 没有变化，无需提交。"
      exit 0
    fi

    git config user.name "github-actions[bot]"
    git config user.email "github-actions[bot]@users.noreply.github.com"
    git add config.json update.log README.md   # ⬅️ 加上 README.md

    # 用当前时间作为 commit 消息（更直观）
    COMMIT_MSG="📅 自动同步时间：$(date '+%Y-%m-%d %H:%M:%S')"
    git commit -m "$COMMIT_MSG"
    git push
