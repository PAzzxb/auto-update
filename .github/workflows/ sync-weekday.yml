name: 🌟 Daily Weekday Synchronizer

on:
  schedule:
    - cron: '0 16 * * *'          # 每天北京时间 00:00（UTC 16:00）
  workflow_dispatch:           

env:
  TZ: 'Asia/Shanghai'         

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write          

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run update script
        run: python update_weekday.py

      - name: Commit and push if changed
        run: |
          # 检查三个文件是否有改动（新增 README.md）
          if git diff --quiet config.json update.log README.md; then
            echo "ℹ️ 没有变化，无需提交。"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 同时添加 config.json update.log README.md
          git add config.json update.log README.md
          
          # 获取新星期（保留原有逻辑）
          NEW_WEEKDAY=$(cat config.json | jq -r '.last_weekday')
          git commit -m "📅 更新星期为: $NEW_WEEKDAY"
          git push
